<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>abram.style</title>
  <meta name="description" content="Abram — personal site. Senior software engineer in Sydney, connecting AI to real-world needs." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#0A0E1C" />

  <!-- Self-hosted fonts: preload the above-the-fold faces + inline @font-face.
       Avoids the render-blocking cross-origin Google Fonts CSS round-trip. -->
  <link rel="preload" href="/fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/fraunces-italic.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face{font-family:'Fraunces';font-style:normal;font-weight:300 600;font-display:swap;src:url('/fonts/fraunces.woff2') format('woff2');}
    @font-face{font-family:'Fraunces';font-style:italic;font-weight:300 600;font-display:swap;src:url('/fonts/fraunces-italic.woff2') format('woff2');}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/jetbrains-mono.woff2') format('woff2');}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
